<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Cleo</title>
    <style>
        :root {
            --orange: #f36d3b;
            --bg-start: #fff3e6;
            --bg-end: #f9f4ef;
            --text: #2d2d2d;
            --green-wa: #25d366;
            --error: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            margin: 0; padding: 15px; color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; box-sizing: border-box; }
        
        .card { 
            background: white; padding: 20px; border-radius: 24px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 15px;
            box-sizing: border-box;
        }
        
        h1 { font-size: 22px; text-align: center; margin-bottom: 20px; font-weight: 800; }

        label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 13px; color: #555; }
        
        input { 
            width: 100%; padding: 12px 15px; border-radius: 12px; border: none; 
            background: #f6f2ee; margin-bottom: 15px; box-sizing: border-box; 
            font-size: 16px; font-family: inherit;
        }

        .flex-row { display: flex; gap: 10px; }
        .flex-row div { flex: 1; }

        /* Contador de perros corregido para móvil */
        .counter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .counter { display: flex; align-items: center; background: #f6f2ee; border-radius: 30px; padding: 5px 10px; gap: 15px; }
        .counter button { border: none; background: white; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .counter span { font-weight: 800; font-size: 18px; }

        .check-group { 
            background: #fdfaf7; padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; font-size: 14px; display: flex; 
            align-items: flex-start; gap: 12px; text-align: left;
            line-height: 1.3; border: 1px solid #f2ece6;
        }

        .check-group input[type="checkbox"] {
            width: 20px; height: 20px; margin: 0; flex-shrink: 0;
        }

        .total-card { 
            background: white; padding: 20px; border-radius: 24px; 
            text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .price-big { font-size: 42px; font-weight: 800; color: var(--orange); margin: 5px 0; }
        
        #error-msg {
            background: #fff0f0; color: var(--error); padding: 12px; border-radius: 12px;
            font-size: 13px; font-weight: 600; margin-top: 10px; display: none;
            border: 1px solid #ffcdd2;
        }

        .btn-wa { 
            display: block; background: #ccc; color: white; text-decoration: none; 
            text-align: center; padding: 18px; border-radius: 18px; font-weight: 800; 
            margin-top: 15px; opacity: 0.6; cursor: not-allowed; transition: 0.3s;
            font-size: 16px;
        }

        .btn-wa.active { background: var(--green-wa); opacity: 1; cursor: pointer; box-shadow: 0 5px 15px rgba(37,211,102,0.3); }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora Cleo 🐾</h1>
    
    <div class="card">
        <label>Nombre del perro</label>
        <input id="nombre" placeholder="Ej. Luna" oninput="update()">

        <label>Raza</label>
        <input id="raza" placeholder="Ej. Mestizo" oninput="update()">

        <div class="flex-row">
            <div>
                <label>Edad</label>
                <input id="edad" placeholder="2 años" oninput="update()">
            </div>
            <div>
                <label>Peso (kg)</label>
                <input id="peso" type="number" placeholder="8" oninput="update()">
            </div>
        </div>

        <div class="counter-row">
            <label style="margin:0">Número de perros</label>
            <div class="counter">
                <button onclick="change(-1)">-</button>
                <span id="num">1</span>
                <button onclick="change(1)">+</button>
            </div>
        </div>

        <label>Entrada (Entrega)</label>
        <input type="datetime-local" id="entrada" onchange="update()">
        
        <label>Salida (Recogida)</label>
        <input type="datetime-local" id="salida" onchange="update()">

        <div class="check-group" style="background: #fff3e6;">
            <input type="checkbox" id="soloDia" onchange="update()">
            <span><b>Solo reserva el día</b><br><small>(Máx 22:00h · Sin noche)</small></span>
        </div>

        <div class="check-group">
            <input type="checkbox" id="check" onchange="update()">
            <span>Confirmo perro <b>pequeño o mediano</b>.</span>
        </div>
    </div>

    <div class="total-card">
        <label>TOTAL ESTIMADO</label>
        <div class="price-big" id="total">0€</div>
        
        <div id="error-msg"></div>

        <a id="link" href="#" class="btn-wa">Reservar por WhatsApp</a>
    </div>
</div>

<script>
    let numPerros = 1;

    function change(v) {
        numPerros += v;
        if (numPerros < 1) numPerros = 1;
        document.getElementById("num").innerText = numPerros;
        update();
    }

    window.onload = function() {
        const ahora = new Date();
        const isoStr = ahora.toLocaleString('sv-SE').replace(' ', 'T').slice(0, 16);
        document.getElementById("entrada").min = isoStr;
        document.getElementById("salida").min = isoStr;
    };

    function update() {
        const errorDiv = document.getElementById("error-msg");
        const eVal = document.getElementById("entrada").value;
        const sVal = document.getElementById("salida").value;
        const nombre = document.getElementById("nombre").value.trim();
        const checkSize = document.getElementById("check").checked;
        const soloDia = document.getElementById("soloDia").checked;
        const btn = document.getElementById("link");
        
        errorDiv.style.display = "none";
        let errorTxt = "";
        let total = 0;

        if (eVal && sVal) {
            const d1 = new Date(eVal);
            const d2 = new Date(sVal);
            const ahora = new Date();
            const h = (d2 - d1) / 3600000;

            if (d1 < ahora - 300000) {
                errorTxt = "⚠️ La fecha no puede ser en el pasado.";
            } else if (h <= 0) {
                errorTxt = "⚠️ La recogida debe ser después.";
            } else {
                const mismoDia = d1.toDateString() === d2.toDateString();
                const horaSalida = d2.getHours();

                if (soloDia) {
                    if (!mismoDia || horaSalida >= 22) {
                        errorTxt = "⚠️ 'Solo día' requiere mismo día y antes 22h.";
                    } else { total = 18 * numPerros; }
                } else {
                    if (h < 24 && mismoDia && horaSalida < 22) { total = 18 * numPerros; }
                    else {
                        let noches = Math.max(1, Math.floor(h / 24));
                        let resto = h % 24;
                        let precioBase = (noches * 20);
                        if (resto > 0 && h >= 24) precioBase += 18;
                        total = precioBase * numPerros;
                    }
                }
            }
        }

        document.getElementById("total").innerText = total + "€";

        if (!errorTxt) {
            if (!nombre && (eVal || sVal)) errorTxt = "✍️ Escribe el nombre del perro.";
            else if (eVal && sVal && !checkSize) errorTxt = "📏 Confirma el tamaño.";
        }

        if (errorTxt) {
            errorDiv.innerText = errorTxt;
            errorDiv.style.display = "block";
            btn.classList.remove("active");
            btn.href = "javascript:void(0);";
        } else if (total > 0 && nombre && checkSize) {
            btn.classList.add("active");
            const texto = `¡Hola Cleo! Reserva para ${nombre}.\nPerros: ${numPerros}\nEntrada: ${eVal.replace('T',' ')}\nSalida: ${sVal.replace('T',' ')}\nTotal: ${total}€`;
            btn.href = "https://wa.me/34640949118?text=" + encodeURIComponent(texto);
        }
    }
</script>
</body>
</html>
