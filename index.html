<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleo Cuida Peludos</title>

<style>
:root{
  --orange:#f36d3b;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#fff3e6 0%,#f9f4ef 100%);
  margin:0;
  padding:20px;
}

.container{max-width:420px;margin:auto;}

.logo{text-align:center;margin-bottom:20px;}
.logo-circle{
  width:60px;height:60px;background:#ffe5d6;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:auto;font-size:24px;
}

h1{text-align:center;font-size:24px;margin:10px 0;font-weight:800;}
.sub{text-align:center;color:#888;margin-bottom:20px;}

.card{
  background:white;
  padding:20px;
  border-radius:24px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

label{font-weight:700;font-size:14px;display:block;margin-bottom:6px;}

input{
  width:100%;
  padding:18px 16px;
  border-radius:16px;
  border:none;
  background:#f6f2ee;
  margin-bottom:18px;
  font-size:16px;
  font-weight:500;
  min-height:56px;
  box-sizing:border-box;
}

input[type="datetime-local"]{
  appearance:none;
  -webkit-appearance:none;
}

input:focus{
  outline:none;
  box-shadow:0 0 0 2px rgba(243,109,59,0.2);
}

.counter{
  display:flex;align-items:center;justify-content:space-between;
  background:#f6f2ee;border-radius:20px;padding:5px 10px;margin-bottom:15px;
}
.counter button{
  border:none;background:#eee;width:35px;height:35px;border-radius:50%;
}
.counter span{font-weight:bold;}

.pills{display:flex;gap:10px;}
.pill{
  flex:1;padding:12px;border-radius:20px;background:#eee;
  text-align:center;cursor:pointer;font-weight:600;
}
.pill.active{background:var(--orange);color:white;}

.check{
  margin-top:15px;
  background:#f6f2ee;
  padding:12px;
  border-radius:14px;
  font-size:13px;
}

.total{
  background:white;
  padding:20px;
  border-radius:24px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.price{
  font-size:36px;
  font-weight:800;
  color:var(--orange);
}

.review{
  background:#ffe7c7;
  padding:15px;
  border-radius:18px;
  margin:15px 0;
}

/* BOTÓN */
.btn{
  display:block;
  background:#cfd8d3;
  text-align:center;
  padding:16px;
  border-radius:18px;
  font-weight:bold;
  text-decoration:none;
  color:#ffffff;
  transition:0.3s;
}

.btn.active{
  background:#25D366;
  color:white;
  box-shadow:0 4px 12px rgba(37,211,102,0.3);
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<div class="logo-circle">🐾</div>
<h1>Cuidamos de tu peludo como si fuera nuestro</h1>
<div class="sub">Calcula el precio de tu reserva</div>
</div>

<div class="card">

<label>Nombre del perro</label>
<input id="nombre" placeholder="Ej. Luna" oninput="update()">

<label>Raza</label>
<input id="raza" placeholder="Ej. Mestizo" oninput="update()">

<div style="display:flex; gap:10px;">
  <div style="flex:1;">
    <label>Edad</label>
    <input id="edad" placeholder="Ej. 2 años" oninput="update()">
  </div>

  <div style="flex:1;">
    <label>Peso (kg)</label>
    <input id="peso" placeholder="Ej. 8" oninput="update()">
  </div>
</div>

<label>Número de perros</label>
<div class="counter">
<button onclick="change(-1)">−</button>
<span id="num">1</span>
<button onclick="change(1)">+</button>
</div>

<label>Entrada</label>
<input type="datetime-local" id="entrada" onchange="update()">

<label>Salida</label>
<input type="datetime-local" id="salida" onchange="update()">

<label>Sociabilidad</label>
<div class="pills">
<div id="p1" class="pill active" onclick="setSoc('Sociable')">Sociable</div>
<div id="p2" class="pill" onclick="setSoc('Prefiere estar solo')">Prefiere estar solo</div>
</div>

<div class="check">
<input type="checkbox" id="check" onchange="update()">
 Confirmo que mi perro es pequeño o mediano
</div>

</div>

<div class="total">
<div>TOTAL ESTIMADO</div>
<div class="price" id="total">0€</div>
</div>

<div class="review">
"Mi perrita volvió feliz." — María G.
</div>

<a id="link" class="btn" target="_blank">
Reservar por WhatsApp
</a>

<p style="text-align:center;font-size:12px;color:#888;">
Cleo te responderá lo antes posible
</p>

</div>

<script>

let num=1;
let sociabilidad="Sociable";

function change(v){
  num+=v;
  if(num<1) num=1;
  document.getElementById("num").innerText=num;
  update();
}

function setSoc(val){
  sociabilidad=val;
  document.getElementById("p1").classList.toggle("active",val==="Sociable");
  document.getElementById("p2").classList.toggle("active",val!=="Sociable");
  update();
}

function calc(){
  let e=entrada.value;
  let s=salida.value;
  if(!e||!s) return 0;

  let h=(new Date(s)-new Date(e))/3600000;
  if(h<=0) return 0;

  if(h<=24) return 20*num;

  return (Math.floor(h/24)*20 + (h%24>0?18:0))*num;
}

function update(){

  let nombre=document.getElementById("nombre").value;
  let raza=document.getElementById("raza").value;
  let edad=document.getElementById("edad").value;
  let peso=document.getElementById("peso").value;

  let e=entrada.value;
  let s=salida.value;
  let check=document.getElementById("check").checked;

  let total=calc();
  document.getElementById("total").innerText=total+"€";

  let boton=document.getElementById("link");

  if(!e || !s || !check || total===0){
    boton.href="#";
    boton.classList.remove("active");
    boton.style.opacity="0.6";
    return;
  }

  boton.classList.add("active");
  boton.style.opacity="1";

  let texto=`¡Hola, Cleo!

Quiero consultar disponibilidad

────────────

Nombre del perro: ${nombre || "-"}
Raza: ${raza || "-"}
Edad: ${edad || "-"}
Peso: ${peso ? peso + " kg" : "-"}

────────────

Número de perros: ${num}
Sociabilidad: ${sociabilidad}

Entrada: ${e.replace('T',' ')}
Salida: ${s.replace('T',' ')}

────────────

Precio: ${total}€

¿Tendrías disponibilidad?`;

  let msg=encodeURIComponent(texto);

  boton.href="https://wa.me/34640949118?text="+msg;
}

</script>

</body>
</html>
