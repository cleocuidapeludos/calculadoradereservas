<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Cleo</title>
    <style>
        :root {
            --orange: #f36d3b;
            --bg-start: #fff3e6;
            --bg-end: #f9f4ef;
            --text: #2d2d2d;
            --green-wa: #25d366;
            --paw-bg: #fee2d5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
        }

        .container { max-width: 420px; margin: auto; }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-icon { background: var(--paw-bg); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; }
        h1 { font-size: 24px; text-align: center; margin: 0; font-weight: 800; line-height: 1.2; }
        .sub { text-align: center; color: #888; margin: 8px 0 25px; font-size: 15px; }
        
        .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        
        input { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: #f6f2ee; margin-bottom: 18px; box-sizing: border-box; font-size: 16px;
            font-family: inherit;
        }

        input[type="datetime-local"] {
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
        }

        input::-webkit-calendar-picker-indicator {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23f36d3b" viewBox="0 0 16 16"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>');
            width: 22px;
            height: 22px;
        }

        .flex-row { display: flex; gap: 10px; }
        .flex-row div { flex: 1; }

        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .counter { display: flex; align-items: center; background: #f6f2ee; border-radius: 30px; padding: 5px 15px; gap: 20px; }
        .counter button { border: none; background: #eee; width: 32px; height: 32px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .counter span { font-weight: bold; font-size: 18px; }
        
        .pills { display: flex; gap: 10px; margin-top: 10px; }
        .pill { flex: 1; padding: 14px; border-radius: 18px; background: #f6f2ee; text-align: center; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .pill.active { background: var(--orange); color: white; }
        
        .check-container { display: flex; align-items: flex-start; gap: 12px; margin-top: 10px; background: #fdfaf7; padding: 15px; border-radius: 15px; font-size: 13px; border: 1px solid #f2ece6; }
        .check-container.special { background: #fff0eb; border-color: #ffd8cc; }

        .total-card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .price-big { font-size: 48px; font-weight: 800; color: var(--orange); line-height: 1; }
        .price-big span { font-size: 24px; }
        
        .btn-wa { 
            display: block; 
            background: #ccc; 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 18px; 
            transition: all 0.4s ease; 
            opacity: 0.6;
            cursor: not-allowed;
            margin-top: 20px;
        }

        .btn-wa.active { 
            background: var(--green-wa); 
            opacity: 1;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo-icon">🐾</div>
        <h1>Cuidamos de tu peludo como si fuera nuestro 🐶</h1>
        <div class="sub">Calcula el precio de tu reserva</div>
    </div>

    <div class="card">
        <label>Nombre del perro</label>
        <input id="nombre" placeholder="Ej. Luna" oninput="update()">

        <label>Raza</label>
        <input id="raza" placeholder="Ej. Beagle, Mestizo..." oninput="update()">

        <div class="flex-row">
            <div>
                <label>Edad</label>
                <input id="edad" placeholder="Ej. 3 años" oninput="update()">
            </div>
            <div>
                <label>Peso (aprox.)</label>
                <input id="peso" placeholder="Ej. 8" oninput="update()">
            </div>
        </div>

        <div class="row">
            <label style="margin:0">Número de perros</label>
            <div class="counter">
                <button onclick="change(-1)">−</button>
                <span id="num">1</span>
                <button onclick="change(1)">+</button>
            </div>
        </div>

        <label>Entrada (Entrega)</label>
        <input type="datetime-local" id="entrada" onchange="update()">
        
        <label>Salida (Recogida)</label>
        <input type="datetime-local" id="salida" onchange="update()">

        <div class="check-container special">
            <input type="checkbox" id="soloDia" style="width:20px; height:20px; margin:0;" onchange="update()">
            <span><b>Solo reserva el día</b> (18€ por perro, sin noche).</span>
        </div>

        <label style="margin-top:20px">Sociabilidad</label>
        <div class="pills">
            <div id="p1" class="pill active" onclick="selectPill('Sociable')">Sociable</div>
            <div id="p2" class="pill" onclick="selectPill('Prefiere estar solo')">Prefiere estar solo</div>
        </div>

        <div class="check-container">
            <input type="checkbox" id="check" style="width:20px; height:20px; margin:0;" onchange="update()">
            <span>Confirmo que mi perro es <b>pequeño o mediano</b>.</span>
        </div>
    </div>

    <div class="total-card">
        <label>TOTAL ESTIMADO</label>
        <div class="price-big" id="total">0<span>€</span></div>
        <p style="font-size:12px; color:#777; margin-top:15px; line-height:1.4;">
            24h: 20€ · Solo día: 18€ · Perro adicional mismo día: 18€.
        </p>
    </div>

    <a id="link" href="#" class="btn-wa">Reservar por WhatsApp</a>
</div>

<script>
    let num = 1;
    let sociabilidad = "Sociable";

    function change(v) {
        num += v;
        if (num < 1) num = 1;
        document.getElementById("num").innerText = num;
        update();
    }

    function selectPill(val) {
        sociabilidad = val;
        document.getElementById("p1").classList.toggle("active", val === 'Sociable');
        document.getElementById("p2").classList.toggle("active", val === 'Prefiere estar solo');
        update();
    }

    function format(dateStr) {
        if (!dateStr) return "";
        const [fecha, hora] = dateStr.split('T');
        const [ano, mes, dia] = fecha.split('-');
        return `${dia}/${mes}/${ano} ${hora}`;
    }

    function calc() {
        let esSoloDia = document.getElementById("soloDia").checked;
        let e = document.getElementById("entrada").value;
        let s = document.getElementById("salida").value;
        
        if (esSoloDia) return 18 * num;
        if (!e || !s) return 0;

        let diffMs = new Date(s) - new Date(e);
        let h = diffMs / 3600000;
        if (h <= 0) return 0;

        let total = 0;
        if (h <= 24) { total = 20; } 
        else {
            let noches = Math.floor(h / 24);
            let resto = h % 24;
            total = (noches * 20) + (resto > 0 ? 18 : 0);
        }
        return total * num;
    }

    function update() {
        let total = calc();
        document.getElementById("total").innerHTML = `${total}<span>€</span>`;
        
        let nombre = document.getElementById("nombre").value || "Peludo";
        let checkSize = document.getElementById("check").checked;
        let esSoloDia = document.getElementById("soloDia").checked;
        let eVal = document.getElementById("entrada").value;
        let sVal = document.getElementById("salida").value;
        let btn = document.getElementById("link");

        // IMPORTANTE: Ahora siempre pedimos fechas, sea solo día o no.
        let listo = checkSize && eVal && sVal && total > 0;

        if (listo) {
            let tipo = esSoloDia ? "SOLO DÍA" : "RESERVA CON NOCHE";
            let texto = `¡Hola, Cleo! 
Reserva para ${nombre} (${tipo})

Entrada: ${format(eVal)}
Salida: ${format(sVal)}
Perros: ${num}
Precio: ${total}€`;

            btn.href = "https://wa.me/34640949118?text=" + encodeURIComponent(texto);
            btn.classList.add("active"); 
            btn.onclick = null;
        } else {
            btn.href = "javascript:void(0);";
            btn.classList.remove("active"); 
            btn.onclick = function() {
                alert('Por favor, indica las horas de entrega/recogida y confirma el tamaño del perro.');
            };
        }
    }
</script>

</body>
</html>
