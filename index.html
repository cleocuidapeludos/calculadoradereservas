<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Cleo</title>
    <style>
        :root {
            --orange: #f36d3b;
            --bg-start: #fff3e6;
            --bg-end: #f9f4ef;
            --text: #2d2d2d;
            --green-wa: #25d366;
            --error: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            margin: 0; padding: 20px; color: var(--text); min-height: 100vh;
        }

        .container { max-width: 420px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        input { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: #f6f2ee; margin-bottom: 18px; box-sizing: border-box; font-size: 16px;
        }

        #error-msg {
            background: #fff0f0; color: var(--error); padding: 15px; border-radius: 15px;
            font-size: 13px; font-weight: 600; margin-bottom: 15px; display: none;
            border: 1px solid #ffcdd2; line-height: 1.4;
        }

        .total-card { background: white; padding: 25px; border-radius: 28px; text-align: center; }
        .price-big { font-size: 48px; font-weight: 800; color: var(--orange); }
        
        .btn-wa { 
            display: block; background: #ccc; color: white; text-decoration: none; 
            text-align: center; padding: 20px; border-radius: 20px; font-weight: 800; 
            margin-top: 20px; opacity: 0.6; cursor: not-allowed;
        }

        .btn-wa.active { background: var(--green-wa); opacity: 1; cursor: pointer; }

        .check-group { background: #fdfaf7; padding: 15px; border-radius: 15px; margin-bottom: 10px; font-size: 13px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">Calculadora Cleo 🐾</h1>
    
    <div id="error-msg"></div>

    <div class="card">
        <label>Nombre del perro</label>
        <input id="nombre" placeholder="¿Cómo se llama?" oninput="update()">

        <label>Entrada (Entrega)</label>
        <input type="datetime-local" id="entrada" onchange="update()">
        
        <label>Salida (Recogida)</label>
        <input type="datetime-local" id="salida" onchange="update()">

        <div class="check-group" style="background: #fff3e6;">
            <input type="checkbox" id="soloDia" onchange="update()">
            <span><b>Solo reserva el día</b> (Sin noche · Máx 22:00h)</span>
        </div>

        <div class="check-group">
            <input type="checkbox" id="check" onchange="update()">
            <span>Confirmo perro <b>pequeño o mediano</b>.</span>
        </div>
    </div>

    <div class="total-card">
        <label>TOTAL ESTIMADO</label>
        <div class="price-big" id="total">0€</div>
    </div>

    <a id="link" href="#" class="btn-wa">Reservar por WhatsApp</a>
</div>

<script>
    function update() {
        const errorDiv = document.getElementById("error-msg");
        const eVal = document.getElementById("entrada").value;
        const sVal = document.getElementById("salida").value;
        const nombre = document.getElementById("nombre").value.trim();
        const checkSize = document.getElementById("check").checked;
        const soloDia = document.getElementById("soloDia").checked;
        const btn = document.getElementById("link");
        
        errorDiv.style.display = "none";
        let errorTxt = "";
        let total = 0;

        if (eVal && sVal) {
            const d1 = new Date(eVal);
            const d2 = new Date(sVal);
            const ahora = new Date();
            const h = (d2 - d1) / 3600000;

            // 1. Error de Fecha en el pasado
            if (d1 < ahora - 600000) { // Margen de 10 min
                errorTxt = "⚠️ La fecha de entrada no puede ser en el pasado.";
            } 
            // 2. Error de Orden Cronológico
            else if (h <= 0) {
                errorTxt = "⚠️ La recogida debe ser posterior a la entrega.";
            } 
            // 3. Error de Tiempo Mínimo (ej. 15 min)
            else if (h < 0.25) {
                errorTxt = "⚠️ La estancia es demasiado corta.";
            }
            else {
                const mismoDia = d1.toDateString() === d2.toDateString();
                const horaSalida = d2.getHours();

                if (soloDia) {
                    // 4. Error de Solo Día con horas de Noche
                    if (!mismoDia) {
                        errorTxt = "⚠️ Si es 'Solo día', la entrega y recogida deben ser la misma fecha.";
                    } else if (horaSalida >= 22) {
                        errorTxt = "⚠️ Para guardería de día, la recogida máxima es a las 22:00h.";
                    } else {
                        total = 18;
                    }
                } else {
                    // Cálculo normal
                    if (h < 24 && mismoDia && horaSalida < 22) {
                        total = 18;
                    } else {
                        let noches = Math.max(1, Math.floor(h / 24));
                        let resto = h % 24;
                        total = (noches * 20);
                        if (resto > 0 && h >= 24) total += 18;
                    }
                }
            }
        }

        document.getElementById("total").innerText = total + "€";

        // 5. Errores de campos vacíos
        if (!errorTxt) {
            if (!nombre && (eVal || sVal)) errorTxt = "✍️ Por favor, escribe el nombre del perrito.";
            else if (eVal && sVal && !checkSize) errorTxt = "📏 Debes confirmar que es un perro pequeño o mediano.";
        }

        if (errorTxt) {
            errorDiv.innerText = errorTxt;
            errorDiv.style.display = "block";
            btn.classList.remove("active");
            btn.href = "javascript:void(0);";
        } else if (total > 0 && nombre && checkSize) {
            btn.classList.add("active");
            const texto = `¡Hola Cleo! Reserva para ${nombre}.\nEntrada: ${eVal.replace('T',' ')}\nSalida: ${sVal.replace('T',' ')}\nTotal: ${total}€`;
            btn.href = "https://wa.me/34640949118?text=" + encodeURIComponent(texto);
        }
    }
</script>

</body>
</html>
