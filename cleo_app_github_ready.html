<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleo Cuida Peludos</title>
<style>
body { font-family: Arial; background:#f6f3ef; padding:20px;}
.container { max-width:420px; margin:auto; background:white; padding:20px; border-radius:16px;}
input { width:100%; padding:12px; margin-bottom:10px;}
button { width:100%; padding:14px; background:#25D366; color:white;}
</style>
</head>
<body>
<div class="container">
<h2>Cuidamos de tu peludo como si fuera nuestro</h2>
<p>Calcula el precio de tu reserva</p>

<input id="nombre" placeholder="Nombre del perro">
<input id="num" type="number" value="1">
<input id="entrada" type="datetime-local">
<input id="salida" type="datetime-local">

<p id="total">Introduce fechas</p>

<a id="link" target="_blank">
<button>WhatsApp</button>
</a>
</div>

<script>
function calc(){
let e=document.getElementById("entrada").value;
let s=document.getElementById("salida").value;
if(!e||!s)return 0;
let h=(new Date(s)-new Date(e))/3600000;
let total=0;
if(h<=24) total=20;
else total=Math.floor(h/24)*20+(h%24>0?18:0);
return total;
}

function update(){
let t=calc();
document.getElementById("total").innerText=t? "Total: "+t+"€":"Introduce fechas";

let msg=`Hola Cleo

Nombre: ${nombre.value}
Perros: ${num.value}
Total: ${t}€`;

document.getElementById("link").href="https://wa.me/34640949118?text="+encodeURIComponent(msg);
}

document.querySelectorAll("input").forEach(i=>i.onchange=update);
</script>
</body>
</html>
